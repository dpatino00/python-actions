name: Python Tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to test against"
        required: false
        type: string
        default: '["3.11","3.12","3.13","3.14"]'
      working-directory:
        description: "Working directory for all steps"
        required: false
        type: string
        default: "."
      pytest-args:
        description: "Additional arguments for pytest"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python + uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest ${{ inputs.pytest-args }}
