name: Python Quality

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.12"
      working-directory:
        description: "Working directory for all steps"
        required: false
        type: string
        default: "."
      pre-commit-args:
        description: "Additional arguments for pre-commit run"
        required: false
        type: string
        default: "--all-files"

permissions:
  contents: read

jobs:
  quality:
    name: Lint & Pre-commit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python + uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ inputs.python-version }}

      - name: Run pre-commit
        run: |
          uv run pre-commit run ${{ inputs.pre-commit-args }}
