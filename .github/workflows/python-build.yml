name: Python Build

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.12"
      working-directory:
        description: "Working directory for all steps"
        required: false
        type: string
        default: "."
      verify-install:
        description: "Install the built wheel and run an import smoke test"
        required: false
        type: boolean
        default: true
      import-name:
        description: "Python import name to verify (e.g. 'my_package'). Skipped if empty."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python + uv
        uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ inputs.python-version }}

      - name: Build package
        run: uv build

      - name: Verify wheel installs cleanly
        if: inputs.verify-install
        run: |
          uv venv /tmp/install-test
          VIRTUAL_ENV=/tmp/install-test uv pip install dist/*.whl

      - name: Smoke test import
        if: inputs.verify-install && inputs.import-name != ''
        env:
          IMPORT_NAME: ${{ inputs.import-name }}
        run: |
          /tmp/install-test/bin/python -c "import importlib; importlib.import_module('$IMPORT_NAME'); print('Import OK')"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: ${{ inputs.working-directory }}/dist/
          retention-days: 5
